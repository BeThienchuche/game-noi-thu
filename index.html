<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trò chs nối thú</title>
    <style>
        :root { --bg: #0a0a12; --cell: #16213e; --text: #e94560; --neon: #00fff2; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: -apple-system, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; overflow: hidden;
        }

        #header { width: 100%; padding: 5px; text-align: center; pointer-events: none; }
        h1 { font-size: 1.2rem; margin: 0 0 5px 0; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        .stats-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 8px; }
        .stat-box { 
            background: rgba(255,255,255,0.08); padding: 5px 15px; 
            border-radius: 20px; border: 1px solid var(--text); font-weight: bold; font-size: 0.9rem;
        }

        #game-container { 
            position: relative; padding: 4px; background: #0f3460; 
            border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.7);
            width: 98vw; max-width: 500px;
        }

        #game-board { display: grid; gap: 2px; }

        .cell {
            /* Tự động tính toán kích thước ô dựa trên số cột để luôn vừa màn hình */
            width: 100%; aspect-ratio: 3/4; 
            background: var(--cell); border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: 4.5vw; cursor: pointer; border: 1px solid transparent;
            transition: transform 0.1s ease;
        }
        
        @media (min-width: 600px) {
            .cell { font-size: 24px; }
        }

        .cell:active { transform: scale(0.9); }
        .cell.selected { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); background: #1b3a4b; }
        .cell.empty { opacity: 0; pointer-events: none; visibility: hidden; }

        #line-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }

        .controls { margin-top: 15px; display: flex; gap: 10px; width: 95%; max-width: 400px; justify-content: center; }
        button { 
            flex: 1; padding: 12px 0; 
            background: var(--text); border: none; color: white; 
            border-radius: 8px; font-weight: 800; font-size: 0.85rem;
            border-bottom: 4px solid #951f33;
        }
        button.secondary { background: #4ecca3; border-bottom-color: #3d997a; }
        button:active { transform: translateY(2px); border-bottom-width: 0; }
    </style>
</head>
<body>

<div id="header">
    <h1>TRÒ CHS NỐI THÚ _ THIENR_K</h1>
    <div class="stats-container">
        <div class="stat-box">⭐ <span id="score">0</span></div>
        <div class="stat-box">⏳ <span id="timer">130</span>s</div>
    </div>
</div>

<div id="game-container">
    <div id="game-board"></div>
    <canvas id="line-canvas"></canvas>
</div>

<div class="controls">
    <button class="secondary" onclick="shuffleBoard()">SHUFFLE</button>
    <button onclick="resetGame()">RESET</button>
</div>

<script>
// Tăng số lượng thú: 10 hàng x 10 cột = 100 ô (nhiều hơn bản cũ)
const ROWS = 10; 
const COLS = 10; 
const animals = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔', '🐧', '🐤', '🦉', '🦄'];
let board = [], selected = null, score = 0, timeLeft = 130, timerInterval = null;

const boardEl = document.getElementById('game-board');
const canvas = document.getElementById('line-canvas');
const ctx = canvas.getContext('2d');

function initGame() {
    if (timerInterval) clearInterval(timerInterval);
    score = 0; timeLeft = 130; selected = null;
    document.getElementById('score').innerText = score;
    document.getElementById('timer').innerText = timeLeft;

    let icons = [];
    const totalPairs = (ROWS * COLS) / 2;
    for(let i=0; i < totalPairs; i++) {
        let icon = animals[Math.floor(Math.random() * animals.length)];
        icons.push(icon, icon);
    }
    icons.sort(() => Math.random() - 0.5);

    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
    for(let r=0; r<ROWS; r++) {
        board[r] = [];
        for(let c=0; c<COLS; c++) board[r][c] = icons.pop();
    }
    
    render();
    setTimeout(resizeCanvas, 100);
    startTimer();
}

function resizeCanvas() {
    canvas.width = boardEl.offsetWidth;
    canvas.height = boardEl.offsetHeight;
}

function render() {
    boardEl.innerHTML = '';
    const fragment = document.createDocumentFragment();
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) {
            const div = document.createElement('div');
            div.className = `cell ${board[r][c] === null ? 'empty' : ''}`;
            if (selected && selected.r === r && selected.c === c) div.classList.add('selected');
            div.innerHTML = board[r][c] || '';
            div.onclick = (e) => { e.preventDefault(); handleSelect(r, c); };
            fragment.appendChild(div);
        }
    }
    boardEl.appendChild(fragment);
}

function handleSelect(r, c) {
    if (board[r][c] === null) return;
    if (!selected) {
        selected = {r, c};
        render();
    } else {
        if (selected.r === r && selected.c === c) {
            selected = null;
            render();
        } else if (board[selected.r][selected.c] === board[r][c]) {
            let path = findPath(selected.r, selected.c, r, c);
            if (path) {
                drawLink(path);
                board[selected.r][selected.c] = null;
                board[r][c] = null;
                score += 10;
                document.getElementById('score').innerText = score;
                selected = null;
                setTimeout(() => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    render();
                    checkWin();
                }, 200);
            } else {
                selected = {r, c};
                render();
            }
        } else {
            selected = {r, c};
            render();
        }
    }
}

function drawLink(path) {
    const cellW = boardEl.offsetWidth / COLS;
    const cellH = boardEl.offsetHeight / ROWS;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#00fff2';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    path.forEach((p, i) => {
        let x = p.c * cellW + cellW/2;
        let y = p.r * cellH + cellH/2;
        if(i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

function findPath(r1, c1, r2, c2) {
    let queue = [{r: r1, c: c1, dir: -1, turns: 0, path: [{r: r1, c: c1}]}];
    let visited = new Map();
    while(queue.length > 0) {
        let curr = queue.shift();
        if (curr.turns > 2) continue;
        if (curr.r === r2 && curr.c === c2) return curr.path;
        const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
        for(let i=0; i<4; i++) {
            let nr = curr.r + dirs[i][0], nc = curr.c + dirs[i][1];
            if (nr >= -1 && nr <= ROWS && nc >= -1 && nc <= COLS) {
                let nextTurns = (curr.dir !== -1 && curr.dir !== i) ? curr.turns + 1 : curr.turns;
                if (nextTurns > 2) continue;
                if ((nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === null) || 
                    (nr === r2 && nc === c2) || 
                    nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) {
                    let key = `${nr},${nc},${i}`;
                    if (!visited.has(key) || visited.get(key) >= nextTurns) {
                        visited.set(key, nextTurns);
                        queue.push({r: nr, c: nc, dir: i, turns: nextTurns, path: [...curr.path, {r: nr, c: nc}]});
                    }
                }
            }
        }
    }
    return null;
}

function startTimer() {
    timerInterval = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
        } else {
            clearInterval(timerInterval);
            alert("⏰ Hết giờ! Điểm của bạn: " + score);
            initGame();
        }
    }, 1000);
}

function shuffleBoard() {
    let icons = board.flat().filter(x => x !== null);
    if (icons.length === 0) return;
    icons.sort(() => Math.random() - 0.5);
    for(let r=0; r<ROWS; r++) {
        for(let c=0; c<COLS; c++) if(board[r][c] !== null) board[r][c] = icons.pop();
    }
    render();
}

function checkWin() {
    if (board.flat().every(cell => cell === null)) {
        clearInterval(timerInterval);
        alert("🎉 CHIẾN THẮNG!");
        initGame();
    }
}

function resetGame() { initGame(); }

window.addEventListener('resize', resizeCanvas);
window.onload = initGame;
</script>
</body>
</html>
